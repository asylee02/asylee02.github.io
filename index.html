<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mju</title>
    <link rel="stylesheet" href="homework1.css">
    <link href="/img/favicon.ico" rel="shortcut icon" type="image/x-icon">
</head>
<body>
    <Header>
        <div class="text">
        <img class="text1" src="/img/clock.png" alt="">
        <img class="text2" src="/img/text.png" alt="">
    </div>
    </Header>
    <section>
        <div class="yellow_ment">"연습은 어제의 당신보다 당신을 더 낫게 만든다."</div>


        <div class="lion">
            <div class="lion_all">
                <div class="colon">❝</div>
                <div class="lion_text">
                    <div><strong>아기사자 여러분</strong>은</div>
                    <div>어떤 분야의 전문가가 되기 위해서는</div>
                    <div>최소한 1만 시간의 훈련이 필요합니다</div>
                </div>
                <div class="colon">❞</div>
            </div>
        </div>

        <div class="main_text">
            나는
            <input type="text" placeholder ="예)프로그래밍" class="dept">
            전문가가 될 것이다.
        </div>
        <div class="main_text">
            그래서 앞으로 매일 하루에
            <input type="text" placeholder="예)5" class="time">
            시간씩 훈련할 것이다.
        </div>

    <div class="checkbox">
        <button class="check"=>나는 며칠 동안 훈련을 해야 전문가가 될까?</button>
        <img class="click"src="/img/click.png" alt="">
    </div>

    <div class="result">
        <div  class="main_text">
            <div class="output_box">
                나는 <span class="output1">-빈칸-</span> 전문가가 될 것이다.
            </div>
            <div class="output_box">
                대략 <span class="output2">-빈칸-</span> 일 이상 훈련하셔야 합니다! :)
            </div>
        </div>
    </div>
    </section>
</body>
<script src="homewrok1.js"></script>
</html>
